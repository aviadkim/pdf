# 🚀 Render.com Deployment Configuration
# MCP-Enhanced PDF Processor with full Puppeteer/Playwright support

services:
  - type: web
    name: mcp-pdf-processor
    env: node
    plan: standard  # $25/month - 2GB RAM, 1 CPU
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MCP_MODE
        value: enhanced
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.playwright
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: false
      - key: PORT
        value: 10000
    dockerfilePath: ./Dockerfile

  # Optional: Redis for caching MCP results
  - type: redis
    name: mcp-cache
    plan: starter  # Free tier available
    ipAllowList: []